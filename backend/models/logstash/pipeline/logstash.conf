# ==============================================================================
# LOGSTASH CONFIGURATION FOR GUARDNET
# Ships detection events to Elasticsearch
# ==============================================================================

input {
  file {
    path => "/app/logs/detections.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }
}

filter {
  json {
    source => "message"
  }
  
  date {
    match => [ "timestamp", "ISO8601" ]
  }
  
  mutate {
    convert => {
      "malicious_flows" => "integer"
      "total_flows" => "integer"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "guardnet-detections-%{+YYYY.MM.dd}"
  }
  
  stdout {
    codec => rubydebug
  }
}