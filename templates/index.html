<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GuardNet | Neural SOC Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --border: #30363d; --accent: #58a6ff; --danger: #f85149; --success: #238636; --warning: #d29922; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 240px; background: var(--card); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; margin: 5px 0; border-radius: 6px; cursor: pointer; color: #8b949e; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { background: #21262d; color: white; }
        .nav-item.active { background: #1f6feb; color: white; font-weight: bold; }
        
        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 25px; scroll-behavior: smooth; }
        .view-section { display: none; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Stats & Viz */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 10px; text-align: center; border-top: 3px solid var(--accent); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .stat-val { font-size: 24px; font-weight: bold; color: var(--accent); display: block; margin-top: 5px; }
        
        .viz-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 25px; }
        .chart-container { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 10px; height: 350px; position: relative; }
        
        /* Table */
        .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; color: #8b949e; border-bottom: 1px solid var(--border); padding: 12px; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #21262d; font-size: 13px; font-family: 'Consolas', monospace; }
        .atk-row { background: rgba(248, 81, 73, 0.1) !important; color: var(--danger); }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-ok { background: rgba(35, 134, 54, 0.2); color: var(--success); }
        .badge-atk { background: rgba(248, 81, 73, 0.2); color: var(--danger); animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.5; } }

        #map-container { height: 600px; width: 100%; border-radius: 12px; border: 1px solid var(--border); background: #000; }
        .btn { padding: 12px 24px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; background: var(--success); color: white; transition: 0.3s; }
        .btn-reset { background: #444c56; }
        .btn:hover { filter: brightness(1.2); transform: scale(1.02); }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:var(--accent); text-align:center; margin-bottom: 30px;">🛡️ GuardNet</h2>
        <div class="nav-item active" onclick="switchView('dashboard', this)">📊 Dashboard</div>
        <div class="nav-item" onclick="switchView('map', this)">🌐 Live Map</div>
    </div>

    <div class="main-content">
        <div id="dashboard" class="view-section active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h1>Neural <span style="color:var(--accent)">SOC Terminal</span></h1>
                <div style="display:flex; gap: 10px;">
                    <button id="capBtn" class="btn" onclick="startCapture()">🚀 Run Analysis</button>
                    <button id="resBtn" class="btn btn-reset" onclick="resetDashboard()">🔄 Restart</button>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">Packets Scanned<span id="total" class="stat-val">0</span></div>
                <div class="stat-card" style="border-top-color:var(--danger)">Threats<span id="anomalies" class="stat-val" style="color:var(--danger)">0</span></div>
                <div class="stat-card">Avg Threat %<span id="intensity" class="stat-val">0.00</span></div>
                <div class="stat-card">CPU Load<span id="cpu" class="stat-val">0%</span></div>
            </div>

            <div class="viz-grid">
                <div class="chart-container"><canvas id="threatChart"></canvas></div>
                <div class="chart-container" style="text-align:center; display: flex; flex-direction: column; justify-content: center;">
                    <h3>AI CNN-LSTM</h3>
                    <div id="statusIcon" style="font-size:70px; margin:15px;">🧠</div>
                    <p id="statusPulse" style="color:var(--success); font-weight:bold; letter-spacing: 1px;">SYSTEM READY</p>
                </div>
            </div>

            <div class="table-card">
                <table>
                    <thead><tr><th>Timestamp</th><th>Source IP</th><th>Proto / Entropy</th><th>Status</th></tr></thead>
                    <tbody id="logBody">
                        <tr><td colspan="4" style="text-align:center; color:#8b949e;">Awaiting analysis start...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="map" class="view-section">
            <h1 style="margin-bottom:20px;">Global <span style="color:var(--danger)">Threat Monitor</span></h1>
            <div id="map-container"></div>
        </div>
    </div>

    <script>
        let updateInterval;
        const map = L.map('map-container').setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        let markers = L.layerGroup().addTo(map);

        const ctx = document.getElementById('threatChart').getContext('2d');
        const threatChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ 
                label: 'Entropy Level', 
                data: [], 
                borderColor: '#58a6ff', 
                borderWidth: 2,
                pointRadius: 0,
                fill: true, 
                backgroundColor: 'rgba(88, 166, 255, 0.1)', 
                tension: 0.4 
            }] },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, max: 10, grid: { color: '#30363d' } },
                    x: { grid: { display: false } }
                }
            }
        });

        function switchView(viewId, element) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            element.classList.add('active');
            if(viewId === 'map') setTimeout(() => map.invalidateSize(), 300);
        }

        async function resetDashboard() {
            if(confirm("Are you sure you want to clear all neural data?")) {
                if(updateInterval) clearInterval(updateInterval);
                await fetch('/api/restart');
                
                // Reset UI
                document.getElementById('total').innerText = "0";
                document.getElementById('anomalies').innerText = "0";
                document.getElementById('intensity').innerText = "0.00";
                document.getElementById('cpu').innerText = "0%";
                document.getElementById('logBody').innerHTML = '<tr><td colspan="4" style="text-align:center; color:#8b949e;">System Reset. Awaiting fresh scan...</td></tr>';
                document.getElementById('statusPulse').innerText = "SYSTEM READY";
                document.getElementById('capBtn').innerText = "🚀 Run Analysis";
                document.getElementById('capBtn').style.background = "var(--success)";

                // Clear Viz
                threatChart.data.labels = [];
                threatChart.data.datasets[0].data = [];
                threatChart.update();
                markers.clearLayers();
            }
        }

        async function startCapture() {
            const btn = document.getElementById('capBtn');
            btn.innerText = "🛰️ ANALYZING...";
            btn.style.background = "var(--warning)";
            document.getElementById('statusPulse').innerText = "● LIVE PROCESSING";
            
            await fetch('/api/start_capture');
            if(updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(refreshStats, 2000);
        }

        async function refreshStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                
                if(data.total === 0) return;

                document.getElementById('total').innerText = data.total || 0;
                document.getElementById('anomalies').innerText = data.anomalies || 0;
                document.getElementById('intensity').innerText = (data.avg_intensity || 0).toFixed(2);
                document.getElementById('cpu').innerText = (data.cpu || 0) + "%";

                if (data.logs && data.logs.length > 0) {
                    const latestTime = data.logs[0].timestamp;
                    if (threatChart.data.labels[threatChart.data.labels.length - 1] !== latestTime) {
                        threatChart.data.labels.push(latestTime);
                        threatChart.data.datasets[0].data.push(data.intensity);
                        if(threatChart.data.labels.length > 20) {
                            threatChart.data.labels.shift();
                            threatChart.data.datasets[0].data.shift();
                        }
                        threatChart.update('none');
                    }

                    let rows = "";
                    if(markers.getLayers().length > 30) markers.clearLayers();

                    data.logs.forEach(l => {
                        const isAtk = l.is_attack == 1;
                        const statusClass = isAtk ? 'badge-atk' : 'badge-ok';
                        const statusText = isAtk ? '🚨 ATTACK' : '✅ NORMAL';
                        
                        rows += `<tr class="${isAtk ? 'atk-row' : ''}">
                            <td>${l.timestamp}</td>
                            <td>${l.src_ip}</td>
                            <td><small>${l.protocol || 'TCP'}</small> | <b>${l.entropy}</b></td>
                            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        </tr>`;
                        
                        if(isAtk && l.lat) {
                            L.circleMarker([l.lat, l.lng], {
                                radius: 8, color: '#f85149', weight: 2, fillOpacity: 0.6
                            }).addTo(markers).bindPopup(`<b>Threat Detected!</b><br>IP: ${l.src_ip}`);
                        }
                    });
                    document.getElementById('logBody').innerHTML = rows;
                }
            } catch(e) { console.error("Sync Error:", e); }
        }
    </script>
</body>
</html>
